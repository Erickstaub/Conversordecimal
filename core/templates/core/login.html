{% extends 'core/base.html' %}

{% block content %}
<div class="auth-container">
    <h2>Login</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Entrar</button>
    </form>

    <a href="{% url 'register' %}" class="auth-link">Criar conta</a>
</div>
{% endblock %}
